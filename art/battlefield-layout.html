<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水果突击 · 战场布局底图</title>
<style>
  body { margin:0; background:#0d0a07; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  canvas { border-radius:12px; box-shadow: 0 0 40px rgba(245,194,66,0.15); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W=480, H=920;
const c=document.getElementById('c');
const ctx=c.getContext('2d');

// 等比缩放到屏幕
const s=Math.min((window.innerWidth-40)/W, (window.innerHeight-40)/H);
c.width=W; c.height=H;
c.style.width=W*s+'px'; c.style.height=H*s+'px';
ctx.setTransform(1,0,0,1,0,0);

// ——— 棋盘常量 ———
const CELL=64, GAP=6;
const BW=5*CELL+4*GAP, BH=3*CELL+2*GAP; // 344×204
const BX=(W-BW)/2; // 68

// ——— LAYOUT (H=920 时) ———
const L={
  enemyInfoY:6,   enemyBoardY:62,  enemyWallY:272, wallH:20,
  fieldY:300,     fieldH:282,      playerWallY:590,
  playerBoardY:634, operationY:846, operationH:48, bottomY:898
};

// ——— 背景 ———
const bg=ctx.createLinearGradient(0,0,0,H);
bg.addColorStop(0,'#1a1410'); bg.addColorStop(0.5,'#2a2218'); bg.addColorStop(1,'#1a1410');
ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

// ——— 辅助函数 ———
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function labelXY(x,y,text,color='#C9B48A',size=11){ctx.font=`bold ${size}px sans-serif`;ctx.textAlign='center';ctx.fillStyle=color;ctx.fillText(text,x,y);}
function sideLabel(x,y,w,h,text,color='#F5C242'){
  ctx.save();
  ctx.font='bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=color;
  ctx.fillText(text, x+w/2, y+h/2);
  ctx.restore();
}

// ——— 1. 顶栏 ———
ctx.fillStyle='rgba(245,194,66,0.08)';
ctx.fillRect(0,0,W,62);
ctx.strokeStyle='rgba(245,194,66,0.2)'; ctx.lineWidth=1;
ctx.beginPath(); ctx.moveTo(0,62); ctx.lineTo(W,62); ctx.stroke();
labelXY(W/2,28,'▸ 顶栏：关卡信息 + SP ⚡','rgba(245,194,66,0.7)',11);
labelXY(W/2,48,'6 ~ 62','rgba(245,194,66,0.35)',10);

// ——— 2. 敌方棋盘 ———
ctx.fillStyle='rgba(255,59,48,0.06)';
rrect(0, L.enemyBoardY, W, BH, 6); ctx.fill();
ctx.strokeStyle='rgba(255,59,48,0.3)'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
rrect(0, L.enemyBoardY, W, BH, 6); ctx.stroke(); ctx.setLineDash([]);

// 画15个格子
for(let r=0;r<3;r++)for(let c=0;c<5;c++){
  const x=BX+c*(CELL+GAP), y=L.enemyBoardY+r*(CELL+GAP);
  ctx.fillStyle=(r+c)%2===0?'rgba(255,59,48,0.05)':'rgba(255,59,48,0.09)';
  rrect(x,y,CELL,CELL,6); ctx.fill();
}
sideLabel(0,L.enemyBoardY,W,BH,'敌方棋盘 3×5','#ff3b4e');
labelXY(W/2, L.enemyBoardY+BH-10, '62 ~ 266','rgba(255,59,48,0.35)',10);

// ——— 3. 敌方城墙 ———
ctx.fillStyle='rgba(90,72,50,0.35)';
rrect(BX, L.enemyWallY, BW, L.wallH, 3); ctx.fill();
ctx.strokeStyle='rgba(255,150,60,0.5)'; ctx.lineWidth=1;
rrect(BX, L.enemyWallY, BW, L.wallH, 3); ctx.stroke();
sideLabel(BX-80, L.enemyWallY, 80, L.wallH,'敌墙','#ff963c');
labelXY(W/2, L.enemyWallY+L.wallH+10, '272 ~ 292','rgba(255,150,60,0.3)',9);

// ——— 4. 战场区域 ———
ctx.fillStyle='rgba(100,200,255,0.04)';
rrect(8, L.fieldY, W-16, L.fieldH, 6); ctx.fill();
ctx.strokeStyle='rgba(100,200,255,0.25)'; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
rrect(8, L.fieldY, W-16, L.fieldH, 6); ctx.stroke(); ctx.setLineDash([]);

// 透视网格示意
ctx.strokeStyle='rgba(255,200,100,0.06)'; ctx.lineWidth=1;
for(let i=0;i<6;i++){
  const spread=40+i*45;
  ctx.beginPath(); ctx.moveTo(W/2, L.fieldY+L.fieldH*0.25);
  ctx.lineTo(W/2-spread, L.fieldY+L.fieldH);
  ctx.moveTo(W/2, L.fieldY+L.fieldH*0.25);
  ctx.lineTo(W/2+spread, L.fieldY+L.fieldH);
  ctx.stroke();
}
// 中线
ctx.strokeStyle='rgba(255,200,100,0.12)'; ctx.setLineDash([4,6]);
ctx.beginPath(); ctx.moveTo(20, L.fieldY+L.fieldH/2); ctx.lineTo(W-20, L.fieldY+L.fieldH/2); ctx.stroke();
ctx.setLineDash([]);

sideLabel(0, L.fieldY, W, L.fieldH,'战场区 (动态拉伸)','#64c8ff');
labelXY(W/2, L.fieldY+L.fieldH/2, '← 中线 →','rgba(255,200,100,0.25)',10);
labelXY(W/2, L.fieldY+L.fieldH-10, `300 ~ ${L.fieldY+L.fieldH}  (${L.fieldH}px)`,'rgba(100,200,255,0.3)',9);

// ——— 5. 我方城墙 ———
ctx.fillStyle='rgba(90,72,50,0.35)';
rrect(BX, L.playerWallY, BW, L.wallH, 3); ctx.fill();
ctx.strokeStyle='rgba(100,255,80,0.5)'; ctx.lineWidth=1;
rrect(BX, L.playerWallY, BW, L.wallH, 3); ctx.stroke();
sideLabel(BX-80, L.playerWallY, 80, L.wallH,'我墙','#64ff50');
labelXY(W/2, L.playerWallY+L.wallH+10, '590 ~ 610','rgba(100,255,80,0.3)',9);

// ——— 6. 我方棋盘 ———
ctx.fillStyle='rgba(100,255,80,0.06)';
rrect(0, L.playerBoardY, W, BH, 6); ctx.fill();
ctx.strokeStyle='rgba(100,255,80,0.3)'; ctx.lineWidth=1.5;
rrect(0, L.playerBoardY, W, BH, 6); ctx.stroke();

for(let r=0;r<3;r++)for(let c=0;c<5;c++){
  const x=BX+c*(CELL+GAP), y=L.playerBoardY+r*(CELL+GAP);
  ctx.fillStyle=(r+c)%2===0?'rgba(255,235,180,0.04)':'rgba(255,235,180,0.08)';
  rrect(x,y,CELL,CELL,6); ctx.fill();
}
sideLabel(0, L.playerBoardY, W, BH,'我方棋盘 3×5','#64ff50');
labelXY(W/2, L.playerBoardY+BH-10, '634 ~ 838','rgba(100,255,80,0.3)',10);

// ——— 7. 底栏 ———
ctx.fillStyle='rgba(245,194,66,0.06)';
ctx.fillRect(0, L.operationY, W, L.operationH);
ctx.strokeStyle='rgba(245,194,66,0.2)'; ctx.lineWidth=1;
ctx.beginPath(); ctx.moveTo(0, L.operationY); ctx.lineTo(W, L.operationY); ctx.stroke();
labelXY(W/2, L.operationY+22,'操作条：溢出队列 📦＋果汁 ⚡','rgba(245,194,66,0.6)',11);
labelXY(W/2, L.operationY+40, `846 ~ 898`,'rgba(245,194,66,0.3)',10);

// ——— 标注线 ———
const drawArrow=(fromY,toY,color,text)=>{
  const ax=W-26;
  ctx.strokeStyle=color; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(ax,fromY); ctx.lineTo(ax,toY); ctx.stroke();
  ctx.setLineDash([]);
  // 箭头
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(ax,toY); ctx.lineTo(ax-4,toY-8); ctx.lineTo(ax+4,toY-8); ctx.closePath(); ctx.fill();
  ctx.font='10px sans-serif'; ctx.textAlign='right'; ctx.fillStyle=color;
  ctx.fillText(text, ax-10, (fromY+toY)/2+4);
};

// 右上尺寸标注
drawArrow(0,62,'rgba(245,194,66,0.35)','顶栏 62');
drawArrow(62,266,'rgba(255,59,48,0.35)','敌盘 204');
drawArrow(272,292,'rgba(255,150,60,0.35)','墙 20');
drawArrow(300,L.fieldY+L.fieldH,'rgba(100,200,255,0.35)',`战场 ${L.fieldH}`);
drawArrow(590,610,'rgba(100,255,80,0.35)','墙 20');
drawArrow(634,838,'rgba(100,255,80,0.35)','我盘 204');
drawArrow(846,898,'rgba(245,194,66,0.35)','底栏 52');

// ——— 底部标题 ———
ctx.font='bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.textAlign='center';
ctx.fillStyle='#F5C242';
ctx.fillText('水果突击 · 战场布局',W/2,915);

</script>
</body>
</html>
