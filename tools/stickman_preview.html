<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>火柴人预览 · 13种水果兵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2b3240;font-family:sans-serif;padding:16px}
h1{color:#eee;text-align:center;margin-bottom:6px;font-size:19px}
p.sub{color:#9aa4b2;text-align:center;margin-bottom:14px;font-size:12px}
canvas{display:block;margin:0 auto;border-radius:8px;background:#ede8d5;max-width:100%;height:auto}
</style></head>
<body>
<h1>水果突击 · 火柴人渲染器 v60 预览</h1>
<p class="sub">每种水果三个等级(Lv1/2/3,越高越大)。红边=敌方朝向,绿边=我方朝向;Lv3 展示攻击姿态。直接双击本文件即可在浏览器打开。</p>
<canvas id="c" width="1040" height="2250"></canvas>
<!-- 真渲染器:定义 drawStickmanShape / stickWeaponForRole,IIFE 因无 drawSoldier 自动空转 -->
<script src="../js/stickman_render_v60.js"></script>
<script>
// 与 config.js 同步的 13 种水果(仅取渲染所需字段)
const FRUITS = [
  { icon:'🍉', name:'西瓜盾卫', color:'#34c96b', role:'tank' },
  { icon:'🥥', name:'椰子守卫', color:'#9f7a4c', role:'tank' },
  { icon:'🍍', name:'菠萝枪兵', color:'#ffb337', role:'front' },
  { icon:'🍇', name:'葡萄射手', color:'#9b5cff', role:'back' },
  { icon:'🫐', name:'蓝莓狙手', color:'#4d7dff', role:'back' },
  { icon:'🍌', name:'香蕉突击', color:'#ffd447', role:'rush' },
  { icon:'🍋', name:'柠檬刺客', color:'#ffe76a', role:'rush' },
  { icon:'🍊', name:'橙子炮手', color:'#ff9838', role:'siege' },
  { icon:'🎃', name:'南瓜滚轮', color:'#ff7d35', role:'siege' },
  { icon:'🍐', name:'冰梨术士', color:'#9be7ff', role:'control' },
  { icon:'🍑', name:'蜜桃医师', color:'#ff9fbd', role:'support' },
  { icon:'🥝', name:'奇异果',   color:'#8bd34e', role:'merge' },
  { icon:'🟣', name:'百香果',   color:'#b85cff', role:'merge' },
  // Phase 4 新增
  { icon:'🍓', name:'草莓骑士', color:'#ff4d5a', role:'tank' },
  { icon:'🥑', name:'牛油果力士', color:'#8fa64a', role:'tank' },
  { icon:'🐉', name:'火龙果战士', color:'#ff3b6e', role:'front' },
  { icon:'🫒', name:'橄榄刺客', color:'#8a9a5b', role:'rush' },
  { icon:'🥭', name:'芒果弩手', color:'#ffbd43', role:'back' },
  { icon:'🍒', name:'樱桃炸弹', color:'#d44155', role:'back' },
  { icon:'🍈', name:'哈密瓜萨满', color:'#c8e670', role:'control' },
  { icon:'🌿', name:'薄荷补给球', color:'#7ed6a0', role:'support' },
  { icon:'⚡', name:'电击柠檬球', color:'#ffe76a', role:'support' },
  { icon:'🍯', name:'蜂蜜储蓄球', color:'#f5b642', role:'support' },
  { icon:'🍷', name:'发酵葡萄球', color:'#b86bce', role:'support' },
  { icon:'🧊', name:'冰镇果汁球', color:'#9be7ff', role:'support' },
];

const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const colW = 172, rowH = 250, startX = 70, startY = 560;

const draws = [];
FRUITS.forEach((f, i) => {
  const col = i % 6, row = Math.floor(i / 6);
  const cellX = startX + col * colW, cellY = startY + row * rowH;
  ctx; // noop
  [1, 2, 3].forEach((lv, j) => {
    const cx = cellX + (j - 1) * 44;
    const gy = cellY + 150;
    // 与游戏 render 完全一致的双参数:身体固定(level-1),头随等级放大
    const Z = 3.2;                       // 仅预览放大,保持一切比例不变
    const rBase = 13 + 1 * 1.18;         // 身体永远按 1 级算
    const r = 13 + lv * 1.18;            // 头按当前等级算
    const scaleBody = rBase * 0.135 * Z;
    const scaleHead = r * 0.80 * Z;
    draws.push({
      cx, groundY: gy, scale: scaleBody, headScale: scaleHead,
      phase: (i * 0.13 + j * 0.33) % 1, dir: j === 1 ? -1 : 1,
      headColor: f.color, emoji: f.icon, weapon: stickWeaponForRole(f.role),
      fighting: lv === 3, atk: lv === 3, atkT: 0, _attacking: lv === 3, _off: (i * 0.17) % 1, ink: '#1b1b1b',
      sideColor: j === 1 ? '#ff4a5f' : '#22c55e', hitFlash: 0,
    });
    if (lv === 2) draws[draws.length - 1]._label = `${f.icon} ${f.name}`;
  });
});

// 状态效果 FX 演示行(底部)
const fieldDraws = [
  { fruit: FRUITS[0], x: 250, y: 260, scale: 2.3, sideColor: '#22c55e', dir: 1, weapon: 'shield' },
  { fruit: FRUITS[3], x: 385, y: 220, scale: 2.0, sideColor: '#22c55e', dir: 1, weapon: 'bow', fighting: true },
  { fruit: FRUITS[14], x: 640, y: 215, scale: 2.15, sideColor: '#ff4a5f', dir: -1, weapon: 'shield' },
  { fruit: FRUITS[16], x: 775, y: 265, scale: 2.35, sideColor: '#ff4a5f', dir: -1, weapon: 'spear', fighting: true },
].map((d, i) => ({
  cx: d.x, groundY: d.y, scale: d.scale,
  phase: i * 0.22, dir: d.dir,
  headColor: d.fruit.color, emoji: d.fruit.icon,
  weapon: d.weapon || stickWeaponForRole(d.fruit.role),
  fighting: !!d.fighting, atk: !!d.fighting, atkT: 0,
  _attacking: !!d.fighting, _off: i * 0.19,
  sideColor: d.sideColor, hitFlash: 0,
  _fieldLabel: d.fruit.name,
}));

function previewRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawPreviewFruitBoard(x, y, cell, gap, flip) {
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 5; c++) {
      const idx = (r * 5 + c + (flip ? 7 : 0)) % FRUITS.length;
      const px = x + c * (cell + gap);
      const py = y + r * (cell + gap);
      ctx.fillStyle = 'rgba(255,253,240,0.86)';
      previewRoundRect(px, py, cell, cell, 8);
      ctx.fill();
      ctx.strokeStyle = 'rgba(105,136,82,0.20)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.font = `${Math.round(cell * 0.56)}px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(FRUITS[idx].icon, px + cell / 2, py + cell / 2 + 1);
    }
  }
}

function drawPreviewSpawnStrip(x, y, w) {
  ctx.fillStyle = 'rgba(255,253,240,0.88)';
  previewRoundRect(x, y, w, 32, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(38,82,57,0.14)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#203629';
  previewRoundRect(x + 7, y + 5, 98, 22, 8);
  ctx.fill();
  ctx.fillStyle = '#fff8cf';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 12px sans-serif';
  ctx.fillText('果汁 8', x + 18, y + 16);

  const bx = x + 124, bw = w - 132;
  const g = ctx.createLinearGradient(0, y + 4, 0, y + 28);
  g.addColorStop(0, '#ffe47a');
  g.addColorStop(1, '#ff9d3f');
  ctx.fillStyle = g;
  previewRoundRect(bx, y + 4, bw, 24, 9);
  ctx.fill();
  ctx.fillStyle = '#6a320c';
  ctx.textAlign = 'center';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText('出球', bx + bw * 0.44, y + 16);
  ctx.fillStyle = '#c94b55';
  previewRoundRect(bx + bw - 46, y + 6, 38, 20, 8);
  ctx.fill();
  ctx.fillStyle = '#fff8cf';
  ctx.font = 'bold 12px sans-serif';
  ctx.fillText('-3', bx + bw - 27, y + 16);
}

function drawBattlefieldPreview() {
  ctx.save();
  const x = 70, y = 48, w = W - 140, h = 430;
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, '#f9edc6');
  g.addColorStop(0.5, '#f4e5b6');
  g.addColorStop(1, '#ead89f');
  ctx.fillStyle = g;
  previewRoundRect(x, y, w, h, 22);
  ctx.fill();
  ctx.strokeStyle = 'rgba(210,184,125,0.66)';
  ctx.lineWidth = 2;
  ctx.stroke();

  drawPreviewFruitBoard(x + 255, y + 18, 38, 7, true);
  drawPreviewFruitBoard(x + 255, y + h - 182, 38, 7, false);

  ctx.fillStyle = 'rgba(185,87,102,0.76)';
  previewRoundRect(x + 56, y + 152, w - 112, 14, 7);
  ctx.fill();
  ctx.fillStyle = 'rgba(74,168,105,0.76)';
  previewRoundRect(x + 56, y + h - 214, w - 112, 14, 7);
  ctx.fill();

  for (let i = 0; i < 5; i++) {
    const lx = x + 120 + i * ((w - 240) / 4);
    ctx.strokeStyle = 'rgba(92,160,98,0.14)';
    ctx.lineWidth = i === 2 ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(lx, y + 176);
    ctx.lineTo(lx, y + h - 228);
    ctx.stroke();
  }
  ctx.setLineDash([8, 9]);
  ctx.strokeStyle = 'rgba(224,178,88,0.20)';
  ctx.beginPath();
  ctx.moveTo(x + 28, y + h / 2 + 8);
  ctx.lineTo(x + w - 28, y + h / 2 + 8);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#556';
  ctx.textAlign = 'left';
  ctx.font = 'bold 15px sans-serif';
  ctx.fillText('Battle screen fusion check', x, y - 14);
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#7b7f87';
  ctx.fillText('3x5 fruit boards, gummy line soldiers, spawn button', x + 210, y - 14);

  for (const d of fieldDraws) {
    ctx.save();
    drawStickmanShape(ctx, d);
    ctx.restore();
  }
  ctx.fillStyle = '#556';
  ctx.textAlign = 'center';
  ctx.font = '11px sans-serif';
  for (const d of fieldDraws) ctx.fillText(d._fieldLabel, d.cx, d.groundY + 28);
  drawPreviewSpawnStrip(x + 255, y + h - 38, 5 * 38 + 4 * 7);
  ctx.restore();
}

const STATUS_DEMO = [
  { name: '冰冻', se: { frozen: { timer: 1 } } },
  { name: '点燃', se: { burning: { timer: 1 } } },
  { name: '减速', se: { slowed: { timer: 1 } } },
  { name: '眩晕', se: { stunned: { timer: 1 } } },
  { name: '破甲', se: { armorBreak: { timer: 1, value: 5 } } },
  { name: '隐身', se: null, invisible: true },
];
const demoY = startY + Math.ceil(FRUITS.length / 6) * rowH + 40;
STATUS_DEMO.forEach((d, i) => {
  draws.push({
    cx: startX + i * colW * 1.0, groundY: demoY + 120, scale: 2.4,
    phase: (i * 0.2) % 1, dir: 1, headColor: '#34c96b', emoji: '🍉',
    weapon: 'sword', atk: false, atkT: 0, ink: '#1b1b1b',
    sideColor: '#22c55e', hitFlash: 0,
    _se: d.se, _invisible: d.invisible, _demoLabel: d.name,
  });
});

let clock = 0;
function loop(ts) {
  const dt = Math.min(0.05, (ts - (loop._p || ts)) / 1000); loop._p = ts; clock += dt;
  ctx.fillStyle = '#ede8d5'; ctx.fillRect(0, 0, W, H);
  drawBattlefieldPreview();
  ctx.fillStyle = '#556'; ctx.textAlign = 'left'; ctx.font = 'bold 13px sans-serif';
  ctx.fillText('▼ 状态效果 FX', startX - 20, demoY - 10);
  for (const d of draws) d.phase += dt * 0.42;
  for (const d of fieldDraws) d.phase += dt * 0.42;
  // 攻击演示:让 Lv3 的兵循环出手(锯齿 1→0,每 ~1.1s 打一下)
  for (const d of draws) if (d._attacking) { const t = (clock * 0.9 + d._off) % 1; d.atkT = t < 0.25 ? 1 - t / 0.25 : 0; }
  for (const d of fieldDraws) if (d._attacking) { const t = (clock * 0.9 + d._off) % 1; d.atkT = t < 0.25 ? 1 - t / 0.25 : 0; }
  for (const d of draws) {
    ctx.save();
    if (d._invisible) ctx.globalAlpha = 0.4;
    const geom = drawStickmanShape(ctx, d);
    ctx.globalAlpha = 1;
    if (d._se && typeof drawStatusFX === 'function') drawStatusFX(ctx, geom, d._se, d.scale, clock);
    ctx.restore();
  }
  ctx.fillStyle = '#333'; ctx.textAlign = 'center'; ctx.font = '11px sans-serif';
  for (const d of draws) {
    if (d._label) ctx.fillText(d._label, d.cx, d.groundY + 26);
    if (d._demoLabel) ctx.fillText(d._demoLabel, d.cx, d.groundY + 26);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
